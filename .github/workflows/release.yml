name: Release binaries

# Cross-compiles the self-host server and CLI for macOS/Linux (arm64 + amd64)
# and attaches them to a GitHub Release. Trigger by pushing a tag like `v1.2.3`.
# Manual runs (workflow_dispatch) build the binaries but do not publish a release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Reuses the Makefile's cross-compile matrix (single source of truth).
      # CGO disabled -> fully static, portable binaries (pure-Go SQLite).
      - name: Cross-compile binaries
        run: CGO_ENABLED=0 make release

      - name: Generate checksums
        run: |
          cd bin
          sha256sum agentgate-* > checksums.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/agentgate-*
            bin/checksums.txt
          generate_release_notes: true
