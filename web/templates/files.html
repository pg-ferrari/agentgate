{{define "title"}}Files - AgentGate{{end}}

{{define "head"}}
  <link rel="stylesheet" href="/static/vendor/highlight-github.min.css">
  <link rel="stylesheet" href="/static/vendor/highlight-github-dark.min.css" media="(prefers-color-scheme: dark)">
{{end}}

{{define "body"}}
<div id="encrypted-data" data-value="{{.EncryptedData}}" style="display:none"></div>
<div id="expires-at" data-value="{{.ExpiresAt}}" style="display:none"></div>
<div id="share-meta"
     data-id="{{.ID}}"
     data-kind="{{.Kind}}"
     data-never-expires="{{if .NeverExpires}}1{{else}}0{{end}}"
     style="display:none"></div>

<div id="app"></div>

<script src="/static/vendor/highlight.min.js"></script>
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/js/crypto.js"></script>
<script src="/static/js/passphrase.js"></script>
<script src="/static/js/settings.js"></script>
<script src="/static/js/markdown.js"></script>
<script src="/static/js/expiry-controls.js"></script>
<script src="/static/js/file-viewer.js"></script>
{{end}}

{{template "layout" .}}
