<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Owner Dashboard - AgentGate</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .admin-wrap { max-width: 72rem; margin: 0 auto; padding: 1.5rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .admin-header h1 { font-size: 1.25rem; }
    .admin-muted { color: var(--fg-muted); font-size: 0.85rem; }

    /* Login card */
    .login-card { max-width: 26rem; margin: 4rem auto; border: 1px solid var(--border); border-radius: 0.75rem; background: var(--bg-secondary); padding: 1.5rem; }
    .login-card h1 { font-size: 1.15rem; margin-bottom: 0.25rem; }
    .login-tabs { display: flex; gap: 0.5rem; margin: 1rem 0; }
    .login-tab { flex: 1; padding: 0.45rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); cursor: pointer; font-size: 0.85rem; }
    .login-tab[aria-selected="true"] { border-color: var(--accent); color: var(--accent); }
    .login-panel { display: none; }
    .login-panel.active { display: block; }

    label.field { display: block; font-size: 0.8rem; color: var(--fg-muted); margin-bottom: 0.35rem; }
    input.text { width: 100%; padding: 0.5rem 0.6rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font-size: 0.9rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); cursor: pointer; font-size: 0.85rem; }
    .btn:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.78rem; }
    .msg-err { color: var(--danger); font-size: 0.82rem; margin-top: 0.6rem; min-height: 1.1rem; }

    /* Toolbar */
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 0.9rem; }
    select.text { padding: 0.35rem 0.5rem; border: 1px solid var(--border); border-radius: 0.5rem; background: var(--bg); color: var(--fg); font-size: 0.82rem; }

    /* Table */
    .table-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: 0.75rem; }
    table.shares { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.shares th, table.shares td { text-align: left; padding: 0.55rem 0.7rem; border-bottom: 1px solid var(--border-light); white-space: nowrap; }
    table.shares th { background: var(--bg-secondary); color: var(--fg-muted); font-weight: 600; cursor: pointer; user-select: none; }
    table.shares tr:last-child td { border-bottom: none; }
    table.shares a { color: var(--accent); text-decoration: none; }
    table.shares a:hover { text-decoration: underline; }
    .pill { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .pill-active { background: color-mix(in srgb, var(--success) 18%, transparent); color: var(--success); }
    .pill-expired { background: color-mix(in srgb, var(--danger) 18%, transparent); color: var(--danger); }
    .pill-forever { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
    .row-actions { display: flex; gap: 0.3rem; }
    .empty { padding: 2rem; text-align: center; color: var(--fg-muted); }
    .pager { display: flex; align-items: center; justify-content: space-between; margin-top: 0.8rem; font-size: 0.82rem; color: var(--fg-muted); }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; padding: 1rem; z-index: 50; }
    .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 0.75rem; max-width: 30rem; width: 100%; padding: 1.25rem; }
    .modal h2 { font-size: 1.05rem; margin-bottom: 0.5rem; }
    .modal p { color: var(--fg-muted); font-size: 0.88rem; margin-bottom: 1rem; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; }
    .modal code { display: block; word-break: break-all; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem; font-family: var(--font-mono); font-size: 0.78rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="/static/js/settings.js"></script>
  <script src="/static/js/admin-api.js"></script>
  <script src="/static/js/admin-dashboard.js"></script>
</body>
</html>
